<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido | Magnesio Vitalcom Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --black-deep: #050505;
            --black-surface: #121212;
            --gold-text: #d4af37;
            --shadow-gold: 0 10px 30px rgba(191, 149, 63, 0.25);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--black-deep);
            color: #ffffff;
            margin: 0;
            padding: 10px; /* Reducido para móviles pequeños */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--black-surface);
            padding: 30px 20px;
            border-radius: 25px;
            border: 2px solid transparent;
            background-image: linear-gradient(var(--black-surface), var(--black-surface)), var(--gold-primary);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: var(--shadow-gold);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .badge-form {
            border: 1px solid var(--gold-text);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--gold-text);
            font-weight: 700;
            text-transform: uppercase;
        }

        .header-logo h1 {
            background: var(--gold-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            font-weight: 900;
            margin: 15px 0 5px;
            text-transform: uppercase;
        }

        .header-logo p {
            font-size: 0.8rem;
            color: #888;
            margin: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.7rem;
            color: var(--gold-text);
            text-transform: uppercase;
            font-weight: 800;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(191, 149, 63, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1rem; /* Tamaño ideal para evitar zoom en iPhone */
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        select option {
            background: #121212;
            color: white;
        }

        .btn-enviar {
            width: 100%;
            padding: 18px;
            background: var(--gold-primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-enviar:hover { opacity: 0.9; }

        .footer-info {
            font-size: 0.7rem;
            text-align: center;
            color: #666;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <span class="badge-form">Envío Gratis Hoy</span>
        <h1>MAGNESIO VITALCOM</h1>
        <p>Citrato Premium 1000ml</p>
    </div>

    <form id="magnesioForm">
        <div class="form-group">
            <label>Nombre Completo *</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre" required>
        </div>

        <div class="form-group">
            <label>Ciudad y Dirección *</label>
            <input type="text" id="direccion" placeholder="Ej: Medellín, Calle 10 #5-20" required>
        </div>

        <div class="form-group">
            <label>Número de WhatsApp *</label>
            <input type="tel" id="telefono" placeholder="Tu número de contacto" required>
        </div>

        <div class="form-group">
            <label>Selecciona tu Promo *</label>
            <select id="promo" required>
                <option value="1 Unidad Magnesio - $57.900" selected>1 Unidad (1000ml) - $57.900</option>
                <option value="2 Unidades Magnesio - $105.900">2 Unidades (Doble Poder) - $105.900</option>
                <option value="3 Unidades Magnesio - $149.900">3 Unidades (Mejor Ahorro) - $149.900</option>
            </select>
        </div>

        <div class="form-group">
            <label>Método de Pago *</label>
            <select id="pago" required>
                <option value="PAGO CONTRA ENTREGA">PAGO CONTRA ENTREGA (Pagas al recibir)</option>
                <option value="TRANSFERENCIA">Transferencia (Nequi/Bancolombia)</option>
            </select>
        </div>

        <button type="submit" class="btn-enviar">Confirmar mi Pedido</button>
        
        <p style="text-align: center; font-size: 0.75rem; color: #4CAF50; margin-top: 15px; font-weight: 700;">
            🛡️ Pedido Seguro y Verificado
        </p>
    </form>

    <div class="footer-info">
        <b>Soporte:</b> 302 840 4568 <br>
        Despachos desde Cali a toda Colombia
    </div>
</div>

<script>
    document.getElementById('magnesioForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const nombre = document.getElementById('nombre').value;
        const direccion = document.getElementById('direccion').value;
        const tel = document.getElementById('telefono').value;
        const promo = document.getElementById('promo').value;
        const pago = document.getElementById('pago').value;

        // El número de WhatsApp debe ir sin el símbolo +
        const contacto = "573028404568";
        
        // El formato del mensaje con saltos de línea correctos
        const textoLimpio = `*NUEVA ORDEN: MAGNESIO VITALCOM*\n\n` +
                          `👤 *Cliente:* ${nombre}\n` +
                          `📍 *Dirección:* ${direccion}\n` +
                          `📱 *WhatsApp:* ${tel}\n` +
                          `🧴 *Promo:* ${promo}\n` +
                          `💳 *Pago:* ${pago}\n\n` +
                          `_Por favor confirmar despacho inmediato._`;

        const mensajeFinal = encodeURIComponent(textoLimpio);

        // URL CORREGIDA: Usamos wa.me que es la más compatible
        const urlWhatsapp = `https://wa.me/${contacto}?text=${mensajeFinal}`;

        // Redirección directa (mejor para móviles que window.open)
        window.location.href = urlWhatsapp;
    });
</script>

</body>
</html>
